<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuelNow - Emergency Fuel Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .card { background: white; border-radius: 24px; padding: 24px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .emergency-btn { background: linear-gradient(135deg, #ef4444, #b91c1c); color: white; padding: 18px; border-radius: 50px; font-weight: bold; font-size: 1.25rem; box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3); transition: transform 0.2s; }
        .emergency-btn:active { transform: scale(0.95); }
        #order-tracking { display: none; }
    </style>
</head>
<body class="p-6 max-w-md mx-auto">

    <header class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-2">
            <img src="/logo.png" alt="Logo" class="w-12 h-12 object-contain">
            <h1 class="text-3xl font-black text-orange-600">FuelNow</h1>
        </div>
        <div class="w-10 h-10 rounded-full bg-orange-100 overflow-hidden border-2 border-white shadow-sm">
            <img src="https://ui-avatars.com/api/?name=Manoj+V&background=f97316&color=fff" alt="User">
        </div>
    </header>

    <div id="main-order" class="card">
        <h2 class="text-xl font-bold mb-4 text-slate-800">Request Fuel Delivery</h2>
        
        <div class="flex gap-2 mb-6">
            <button id="p-btn" onclick="setType('Petrol')" class="flex-1 p-3 rounded-xl border-2 font-bold transition border-orange-500 bg-orange-50 text-orange-600">Petrol</button>
            <button id="d-btn" onclick="setType('Diesel')" class="flex-1 p-3 rounded-xl border-2 font-bold transition border-slate-100 text-slate-500">Diesel</button>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium text-slate-500 mb-2">Quantity (Liters)</label>
            <input type="range" min="1" max="50" value="5" oninput="updateQty(this.value)" class="w-full h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-orange-500">
            <div id="qty-text" class="text-center font-black text-3xl mt-2 text-slate-800">5 L</div>
        </div>

        <div class="bg-slate-50 p-4 rounded-2xl mb-6 flex items-center gap-3">
            <div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center">📍</div>
            <div>
                <p class="font-bold text-slate-800 text-sm">Detected Location</p>
                <p class="text-slate-500 text-xs text-nowrap">M G Road, Bangalore, KA</p>
            </div>
        </div>

        <button onclick="placeOrder()" class="emergency-btn w-full flex items-center justify-center gap-3">
            🚨 QUICK FUEL
        </button>
    </div>

    <div id="order-tracking" class="card text-center animate-in fade-in slide-in-from-right duration-500">
        <div class="bg-green-100 text-green-700 p-4 -m-6 mb-8 font-bold flex justify-center items-center gap-2">
            🚚 FUEL ON THE WAY
        </div>
        <p class="text-slate-400 text-xs uppercase tracking-widest font-bold mb-1">ETA Delivery</p>
        <h3 class="text-5xl font-black mb-1 text-slate-800">08:45</h3>
        <p class="text-slate-500 font-medium mb-6">Partner: Manoj Vastradmath</p>
        
        <div class="w-full h-40 bg-slate-100 rounded-2xl relative overflow-hidden mb-6 border-4 border-white shadow-inner">
            <div class="absolute inset-0 opacity-20 bg-[radial-gradient(#cbd5e1_1px,transparent_1px)] [background-size:16px_16px]"></div>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-4 h-4 bg-orange-500 rounded-full animate-ping"></div>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-4 h-4 bg-orange-600 rounded-full"></div>
        </div>

        <button onclick="resetApp()" class="text-slate-400 font-bold text-sm uppercase tracking-tighter hover:text-red-500 transition">Cancel Request</button>
    </div>

    <footer class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white/80 backdrop-blur-md border-t p-4 flex justify-around items-center">
        <span class="text-2xl grayscale">🛒</span>
        <span class="text-2xl">📍</span>
        <div class="bg-orange-500 p-3 rounded-2xl -mt-12 border-4 border-white shadow-xl">🚨</div>
        <span class="text-2xl grayscale">🚚</span>
        <span class="text-2xl grayscale">👤</span>
    </footer>

    <script>
        function setType(type) {
            const p = document.getElementById('p-btn');
            const d = document.getElementById('d-btn');
            if(type === 'Petrol') {
                p.className = "flex-1 p-3 rounded-xl border-2 font-bold transition border-orange-500 bg-orange-50 text-orange-600";
                d.className = "flex-1 p-3 rounded-xl border-2 font-bold transition border-slate-100 text-slate-500";
            } else {
                d.className = "flex-1 p-3 rounded-xl border-2 font-bold transition border-orange-500 bg-orange-50 text-orange-600";
                p.className = "flex-1 p-3 rounded-xl border-2 font-bold transition border-slate-100 text-slate-500";
            }
        }
        function updateQty(val) { document.getElementById('qty-text').innerText = val + ' L'; }
        function placeOrder() {
            document.getElementById('main-order').style.display = 'none';
            document.getElementById('order-tracking').style.display = 'block';
        }
        function resetApp() {
            document.getElementById('main-order').style.display = 'block';
            document.getElementById('order-tracking').style.display = 'none';
        }
    </script>
</body>
</html>
